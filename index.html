<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault</title>
    <style>
        /* Global Styling & Dark Theme */
        :root {
            --bg-color: #0d1117;
            --btn-bg: #1f2937;
            --accent: #00ffcc;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Secret Admin Button */
        .admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--text-secondary);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            opacity: 0.3; /* Makes it look hidden */
            transition: all 0.3s ease;
        }

        .admin-btn:hover, .admin-btn:active {
            opacity: 1;
            color: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        /* The Main Dropdown Container */
        .vault-container {
            width: 90%;
            max-width: 400px;
        }

        /* Main Modules Button */
        .module-btn {
            background-color: var(--btn-bg);
            color: var(--text-primary);
            cursor: pointer;
            padding: 18px;
            width: 100%;
            border: 2px solid rgba(0, 255, 204, 0.3);
            text-align: left;
            outline: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-btn:hover, .module-btn.active {
            background-color: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* Arrow Icon Animation */
        .module-btn::after {
            content: '\25BC'; 
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        .module-btn.active::after {
            transform: rotate(-180deg);
        }

        /* Hidden Subject List */
        .subject-list {
            padding: 0 10px;
            background-color: transparent;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }

        /* Individual Subject Buttons */
        .sub-btn {
            background-color: #161b22;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 15px;
            width: 100%;
            border: 1px solid #30363d;
            border-radius: 6px;
            text-align: left;
            outline: none;
            font-size: 16px;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .sub-btn:hover, .sub-btn.active {
            color: var(--text-primary);
            background-color: #21262d;
            border-left: 3px solid var(--accent);
            padding-left: 20px;
        }
        
        .sub-btn::after {
            content: '+'; 
            font-size: 18px;
            font-weight: bold;
        }
        .sub-btn.active::after {
            content: '-';
            color: var(--accent);
        }

        /* Sub-Actions (View / Download) */
        .action-group {
            display: flex;
            gap: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 5px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .view-btn {
            background-color: #238636;
            color: white;
        }
        .view-btn:hover { background-color: #2ea043; }

        .down-btn {
            background-color: #1f6feb;
            color: white;
        }
        .down-btn:hover { background-color: #388bfd; }

    </style>
</head>
<body>

    <button class="admin-btn" onclick="verifyAdmin()">ADMIN</button>

    <div class="vault-container">
        <button id="moduleToggle" class="module-btn">📚 Class Modules</button>
        
        <div id="subjectList" class="subject-list">
            
            <button class="sub-btn" onclick="toggleActions('phy', this)">⚛️ Physics</button>
            <div id="phy-actions" class="action-group">
                <button class="action-btn view-btn" onclick="secureAction('phy', 'view')">👁️ View</button>
                <button class="action-btn down-btn" onclick="secureAction('phy', 'download')">⬇️ Download</button>
            </div>

            <button class="sub-btn" onclick="toggleActions('chem', this)">🧪 Chemistry</button>
            <div id="chem-actions" class="action-group">
                <button class="action-btn view-btn" onclick="secureAction('chem', 'view')">👁️ View</button>
                <button class="action-btn down-btn" onclick="secureAction('chem', 'download')">⬇️ Download</button>
            </div>

            <button class="sub-btn" onclick="toggleActions('math', this)">📐 Mathematics</button>
            <div id="math-actions" class="action-group">
                <button class="action-btn view-btn" onclick="secureAction('math', 'view')">👁️ View</button>
                <button class="action-btn down-btn" onclick="secureAction('math', 'download')">⬇️ Download</button>
            </div>

        </div>
    </div>

    <script>
        // 1. Admin Verification Logic
        function verifyAdmin() {
            let password = prompt("Enter Admin Password:");
            
            if (password === "161819") {
                // Correct password -> Redirect to panel
                window.location.href = "https://profexpanel.netlify.app/?s=aHR0cHM6Ly9sYWxpdC03YjUzOC1kZWZhdWx0LXJ0ZGIuZmlyZWJhc2Vpby5jb218fHxBSXphU3lBNzd6OVJtVi0xdGJjaHV5LWlZakxPcUNhZTVhUzhmMHc=";
            } else if (password !== null) {
                // Wrong password (and they didn't just hit cancel)
                alert("Incorrect password. Access denied.");
            }
        }

        // 2. Store ONLY the Google Drive IDs for security
        const fileIDs = {
            'phy': "1uYjIGR81PP8kTUiYku7-Bm0Zo_2aqRW7",
            'chem': "1WybOcB4XZ7op1-h0u-gAa5WHiHVCe2U_",
            'math': "1CoG1Z-y_F7KrB1i4GQ3a-Tso7Xg-4HxZ"
        };

        // 3. Main Module Button Toggle
        var moduleBtn = document.getElementById("moduleToggle");
        var subjectList = document.getElementById("subjectList");

        moduleBtn.addEventListener("click", function() {
            this.classList.toggle("active");
            
            if (subjectList.style.maxHeight) {
                subjectList.style.maxHeight = null; // Close main menu
                
                // Automatically close any open sub-menus to keep it tidy
                document.querySelectorAll('.action-group').forEach(el => el.style.maxHeight = null);
                document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
            } else {
                subjectList.style.maxHeight = "500px"; // Open main menu
            }
        });

        // 4. Subject Button Toggle (Reveals View/Download)
        function toggleActions(subject, btnElement) {
            var actionDiv = document.getElementById(subject + "-actions");
            
            // If it is already open, just close it
            if (actionDiv.style.maxHeight) {
                actionDiv.style.maxHeight = null;
                btnElement.classList.remove("active");
            } else {
                // Close all other open action menus first
                document.querySelectorAll('.action-group').forEach(el => el.style.maxHeight = null);
                document.querySelectorAll('.sub-btn').forEach(btn => btn.classList.remove('active'));
                
                // Open the one we clicked
                actionDiv.style.maxHeight = actionDiv.scrollHeight + "px";
                btnElement.classList.add("active");
            }
        }

        // 5. Secure View / Download Execution
        function secureAction(subjectCode, actionType) {
            let id = fileIDs[subjectCode];
            
            if (actionType === 'view') {
                window.open(`https://drive.google.com/file/d/${id}/view`, '_blank');
            } 
            else if (actionType === 'download') {
                let hiddenAnchor = document.createElement('a');
                hiddenAnchor.href = `https://drive.google.com/uc?export=download&id=${id}`;
                hiddenAnchor.style.display = 'none';
                document.body.appendChild(hiddenAnchor);
                hiddenAnchor.click();
                document.body.removeChild(hiddenAnchor);
            }
        }
    </script>

</body>
</html>
