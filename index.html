<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PR9V Study Vault</title>
    <style>
        /* Global Styling & Dark Theme */
        :root {
            --bg-color: #0d1117;
            --btn-bg: #1f2937;
            --accent: #00ffcc;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Glowing PR9V Header */
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 5px var(--accent), 0 0 10px var(--accent); transform: scale(1); }
            50% { text-shadow: 0 0 15px #0ff, 0 0 25px #0ff; transform: scale(1.05); color: #ffffff; }
        }
        h1 {
            color: var(--accent);
            letter-spacing: 4px;
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 40px;
            text-align: center;
        }

        /* The Main Dropdown Container */
        .vault-container {
            width: 90%;
            max-width: 400px;
        }

        /* Main Modules Button */
        .module-btn {
            background-color: var(--btn-bg);
            color: var(--text-primary);
            cursor: pointer;
            padding: 18px;
            width: 100%;
            border: 2px solid rgba(0, 255, 204, 0.3);
            text-align: left;
            outline: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .module-btn:hover, .module-btn.active {
            background-color: rgba(0, 255, 204, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }

        /* Arrow Icon Animation */
        .module-btn::after {
            content: '\25BC'; /* Down Arrow */
            font-size: 14px;
            transition: transform 0.3s ease;
        }
        .module-btn.active::after {
            transform: rotate(-180deg);
        }

        /* Hidden Subject List (Accordion) */
        .subject-list {
            padding: 0 15px;
            background-color: transparent;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            border-radius: 0 0 8px 8px;
        }

        /* Individual Subject Buttons */
        .sub-btn {
            background-color: #161b22;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 15px;
            width: 100%;
            border: 1px solid #30363d;
            border-top: none;
            text-align: left;
            outline: none;
            font-size: 16px;
            transition: 0.2s;
            display: block;
            margin-top: 5px;
            border-radius: 6px;
        }

        .sub-btn:hover {
            color: var(--text-primary);
            background-color: #21262d;
            border-left: 3px solid var(--accent);
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <h1>⚡ PR9V ⚡</h1>

    <div class="vault-container">
        <!-- Main Clickable Button -->
        <button id="moduleToggle" class="module-btn">📚 Class Modules</button>
        
        <!-- Expanding List -->
        <div id="subjectList" class="subject-list">
            <!-- Notice how there are no href links here! -->
            <button class="sub-btn" onclick="secureDownload('phy')">⚛️ Physics</button>
            <button class="sub-btn" onclick="secureDownload('chem')">🧪 Chemistry</button>
            <button class="sub-btn" onclick="secureDownload('math')">📐 Mathematics</button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // 1. Accordion Animation Logic
        var moduleBtn = document.getElementById("moduleToggle");
        
        moduleBtn.addEventListener("click", function() {
            this.classList.toggle("active");
            var content = document.getElementById("subjectList");
            if (content.style.maxHeight) {
                content.style.maxHeight = null; // Close it
            } else {
                content.style.maxHeight = content.scrollHeight + "px"; // Open it smoothly
            }
        });

        // 2. Secure Direct Download Logic
        // The Google Drive IDs have been formatted to force direct downloads
        const secureLinks = {
            'phy': "https://drive.google.com/uc?export=download&id=1uYjIGR81PP8kTUiYku7-Bm0Zo_2aqRW7",
            'chem': "https://drive.google.com/uc?export=download&id=1WybOcB4XZ7op1-h0u-gAa5WHiHVCe2U_",
            'math': "https://drive.google.com/uc?export=download&id=1CoG1Z-y_F7KrB1i4GQ3a-Tso7Xg-4HxZ"
        };

        function secureDownload(subjectCode) {
            // Creates an invisible link, clicks it for the user, and destroys it instantly
            let hiddenAnchor = document.createElement('a');
            hiddenAnchor.href = secureLinks[subjectCode];
            hiddenAnchor.style.display = 'none';
            document.body.appendChild(hiddenAnchor);
            hiddenAnchor.click();
            document.body.removeChild(hiddenAnchor);
        }
    </script>

</body>
</html>
